<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AuraBox — Open</title>
    <script src="site-config.js"></script>
    <style>
      body {
        font-family: system-ui, -apple-system, sans-serif;
        max-width: 36rem;
        margin: 2rem auto;
        padding: 0 1rem;
        line-height: 1.5;
        color: #1e1b2e;
      }
      code {
        font-size: 0.9em;
        background: #f3f0ff;
        padding: 0.1em 0.35em;
        border-radius: 4px;
      }
    </style>
  </head>
  <body>
    <main id="main">
      <p>Opening AuraBox…</p>
    </main>
    <script>
      (function () {
        var params = new URLSearchParams(location.search);
        var override = params.get("api");
        var fromConfig =
          window.AURABOX_DEFAULT_REMOTE_API && String(window.AURABOX_DEFAULT_REMOTE_API).trim()
            ? String(window.AURABOX_DEFAULT_REMOTE_API).trim()
            : "";
        var api = (override && String(override).trim()) ? String(override).trim() : fromConfig;

        if (!api) {
          document.getElementById("main").innerHTML =
            "<h1>Set your API URL</h1>" +
            "<p>Edit <code>site-config.js</code> and set <code>AURABOX_DEFAULT_REMOTE_API</code> to your deployed endpoint " +
            "(e.g. <code>https://your-app.up.railway.app/api/flux-generate</code>), then reload.</p>" +
            "<p>Or open <code>index.html?api=...</code> with a URL-encoded API URL.</p>" +
            "<p>For the full flow (camera on page 2), use <strong>HTTPS</strong> (e.g. GitHub Pages).</p>";
          return;
        }

        location.replace("index.html?api=" + encodeURIComponent(api));
      })();
    </script>
  </body>
</html>
