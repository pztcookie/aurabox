<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>AuraBox MVP</title>
    <!-- Anime-style font -->
    <link
      href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <!-- html2canvas for full-page screenshot capture -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <style>
      :root {
        --aura-accent: #ff7bff;
        --aura-accent-2: #7ff0ff;
        --panel-bg: rgba(5, 5, 20, 0.82);
      }

      body {
        margin: 0;
        background-image: url("we_can_do_it.jpg");
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
        background-color: #0f0f14; /* fallback color while image loads */
        color: #fdf4ff;
        font-family: "M PLUS Rounded 1c", system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
        text-align: center;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: flex-start;
        padding-top: 32px;
      }
      #container {
        position: relative;
        width: 640px;
        height: 480px; /* ensure video area is fully visible */
        margin: 24px auto 0;
        padding: 12px;
        border-radius: 18px;
        background: linear-gradient(135deg, rgba(15, 15, 40, 0.96), rgba(12, 4, 24, 0.96));
        box-shadow:
          0 0 25px rgba(255, 123, 255, 0.45),
          0 0 60px rgba(56, 189, 248, 0.25);
        border: 2px solid rgba(255, 255, 255, 0.08);
        overflow: visible;
      }
      video,
      canvas {
        position: absolute;
        top: 0;
        left: 0;
      }
      #auraLabel {
        margin-top: 20px;
        font-size: 26px;
        letter-spacing: 0.04em;
        text-shadow:
          0 0 6px rgba(0, 0, 0, 0.7),
          0 0 16px rgba(255, 123, 255, 0.8);
        padding: 10px 20px;
        display: inline-block;
        border-radius: 999px;
        background: radial-gradient(circle at top left, rgba(255, 123, 255, 0.45), transparent),
          radial-gradient(circle at bottom right, rgba(56, 189, 248, 0.5), transparent),
          rgba(5, 5, 20, 0.75);
        border: 1px solid rgba(255, 255, 255, 0.18);
        backdrop-filter: blur(10px);
      }

      #controls {
        margin-top: 12px;
        display: flex;
        gap: 12px;
        justify-content: center;
        align-items: center;
      }

      #captureButton {
        padding: 8px 18px;
        border-radius: 999px;
        border: 1px solid rgba(255, 255, 255, 0.5);
        background: radial-gradient(circle at top left, rgba(255, 255, 255, 0.18), transparent),
          rgba(5, 5, 20, 0.9);
        color: #fef9ff;
        font-family: inherit;
        font-size: 16px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        cursor: pointer;
        box-shadow:
          0 0 10px rgba(255, 255, 255, 0.45),
          0 0 20px rgba(56, 189, 248, 0.4);
        transition: transform 0.08s ease, box-shadow 0.1s ease, background 0.1s ease;
      }

      #captureButton:hover {
        transform: translateY(-1px);
        box-shadow:
          0 0 14px rgba(255, 255, 255, 0.6),
          0 0 26px rgba(244, 114, 182, 0.7);
      }

      #captureButton:active {
        transform: translateY(1px) scale(0.98);
        box-shadow:
          0 0 6px rgba(255, 255, 255, 0.4),
          0 0 16px rgba(56, 189, 248, 0.4);
      }

      h1 {
        margin: 0;
        padding: 6px 18px 12px;
        font-size: 34px;
        letter-spacing: 0.16em;
        text-transform: uppercase;
        color: #fef9ff;
        text-shadow:
          0 0 10px rgba(255, 255, 255, 0.7),
          0 0 25px rgba(255, 123, 255, 0.9),
          0 0 40px rgba(56, 189, 248, 0.7);
        position: relative;
        display: inline-block;
      }

      h1::before,
      h1::after {
        content: "";
        position: absolute;
        height: 2px;
        width: 38px;
        top: 50%;
        background: linear-gradient(
          to right,
          transparent,
          var(--aura-accent),
          transparent
        );
      }

      h1::before {
        right: 100%;
        margin-right: 8px;
      }

      h1::after {
        left: 100%;
        margin-left: 8px;
      }
    </style>
  </head>
  <body>
    <h1>AuraBox Scanner</h1>

    <div id="container">
      <video id="video" width="640" height="480" autoplay muted></video>
      <canvas id="overlay" width="640" height="480"></canvas>
    </div>

    <div id="auraLabel">Initializing aura scan...</div>
    <div id="controls">
      <button id="captureButton">Capture aura</button>
      <button id="resetButton">Reset</button>
    </div>

    <script type="module">
      import {
        FaceLandmarker,
        FilesetResolver,
      } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.0";

      const video = document.getElementById("video");
      const canvas = document.getElementById("overlay");
      const ctx = canvas.getContext("2d");
      const label = document.getElementById("auraLabel");
      const captureButton = document.getElementById("captureButton");
      const resetButton = document.getElementById("resetButton");
      const downloadLinkId = "aura-download-link";

      async function setupCamera() {
        const stream = await navigator.mediaDevices.getUserMedia({
          video: true,
        });
        video.srcObject = stream;

        // Wait until video has dimensions
        return new Promise((resolve) => {
          video.onloadedmetadata = () => {
            video.play();
            resolve();
          };
        });
      }

      function classifyAura(blendshapes, landmarks) {
        if (!blendshapes) {
          return {
            name: "Mysterious NPC Aura 👁",
            color: "orange",
            confidence: 0,
          };
        }

        const get = (name) =>
          blendshapes.find((b) => b.categoryName === name)?.score || 0;

        const smile =
          (get("mouthSmileLeft") + get("mouthSmileRight")) / 2;
        const cheek =
          (get("cheekSquintLeft") + get("cheekSquintRight")) / 2;
        const browUp = get("browInnerUp");
        const browDown =
          (get("browDownLeft") + get("browDownRight")) / 2;
        const eyeWide =
          (get("eyeWideLeft") + get("eyeWideRight")) / 2;
        const jawOpen = get("jawOpen");
        const mouthPress =
          (get("mouthPressLeft") + get("mouthPressRight")) / 2;
        const eyeSquint =
          (get("eyeSquintLeft") + get("eyeSquintRight")) / 2;
        const eyeSquintLeft = get("eyeSquintLeft");
        const eyeSquintRight = get("eyeSquintRight");
        const eyeBlinkLeft = get("eyeBlinkLeft");
        const eyeBlinkRight = get("eyeBlinkRight");
        const mouthPucker = get("mouthPucker");
        const eyeLookDown =
          (get("eyeLookDownLeft") + get("eyeLookDownRight")) / 2;
        const eyeLookUp =
          (get("eyeLookUpLeft") + get("eyeLookUpRight")) / 2;
        const eyebrowOuterUp =
          (get("browOuterUpLeft") + get("browOuterUpRight")) / 2;

        // Approximate head tilt and nod from landmarks to get pose-based auras
        let headTilt = 0;
        let headNod = 0;
        if (landmarks && landmarks.length > 0) {
          // Use left/right eye outer corners and nose tip
          const leftEyeOuter = landmarks[33]; // approx index
          const rightEyeOuter = landmarks[263]; // approx index
          const noseTip = landmarks[1]; // approx index
          if (leftEyeOuter && rightEyeOuter && noseTip) {
            const dx = rightEyeOuter.x - leftEyeOuter.x;
            const dy = rightEyeOuter.y - leftEyeOuter.y;
            headTilt = Math.atan2(dy, dx); // roll
            headNod = noseTip.y - (leftEyeOuter.y + rightEyeOuter.y) / 2; // positive = looking down
          }
        }

        // Collect possible aura candidates so tiny changes can switch between them
        const candidates = [];

        // Wink Moonlit Witch has absolute top priority:
        // if we detect a wink (one eye more closed than the other), always pick Witch.
        // Magical Girl (open-mouth smile) will NOT override a wink.
        const blinkDiffLR = eyeBlinkLeft - eyeBlinkRight;
        const blinkDiffRL = eyeBlinkRight - eyeBlinkLeft;
        const leftWink = blinkDiffLR > 0.02;
        const rightWink = blinkDiffRL > 0.02;
        if (leftWink || rightWink) {
          const conf =
            (Math.abs(blinkDiffLR) + Math.abs(blinkDiffRL) + Math.max(smile, 0.01)) /
              2.5 +
            0.4;
          return {
            name: "Moonlit Witch Aura 🌙",
            color: "#a855f7",
            confidence: conf,
          };
        }

        // Magical Girl has next priority: any clear open-mouth smile goes here
        if (smile > 0.18 && jawOpen > 0.18) {
          const conf = (smile + jawOpen) / 2;
          return {
            name: "Magical Girl Aura ✨",
            color: "#f472b6",
            confidence: conf,
          };
        }

        // Moonlit Witch (gentle smile + slightly soft eyes, no wink)
        // Make this *very* easy: any tiny smile or eye softening prefers Witch.
        if (smile > 0.02 || eyeSquint > 0.01) {
          const conf = (smile * 0.7 + eyeSquint * 0.3) + 0.2;
          candidates.push({
            name: "Moonlit Witch Aura 🌙",
            color: "#a855f7",
            confidence: conf,
          });
        }

        // Candy Coven (bright but slightly softer smile, cheeks up)
        if (smile > 0.12 && cheek > 0.10 && jawOpen < 0.15) {
          const conf = (smile + cheek) / 2;
          candidates.push({
            name: "Candy Coven Aura 🍬",
            color: "#fb7185",
            confidence: conf,
          });
        }

        // Shadow Fox (slightly narrowed, downward eyes + small smile)
        // Make it very easy: tiny downcast + tiny squint + small smile.
        if (eyeLookDown > 0.01 && eyeSquint > 0.01 && smile > 0.02) {
          const conf = (eyeSquint + eyeLookDown + smile) / 3 + 0.2;
          candidates.push({
            name: "Shadow Fox Aura 🦊",
            color: "#f97316",
            confidence: conf,
          });
        }

        // Starstruck Oracle (wide eyes + raised brows)
        if (eyeWide > 0.10 && browUp > 0.08) {
          const conf = (eyeWide + browUp) / 2;
          candidates.push({
            name: "Starstruck Oracle Aura 🔮",
            color: "turquoise",
            confidence: conf,
          });
        }

        // Celestial Messenger (outer brows lifted, eyes up)
        if (eyebrowOuterUp > 0.08 && (eyeLookUp > 0.06 || eyeWide > 0.12)) {
          const conf = (eyebrowOuterUp + eyeLookUp + eyeWide) / 3;
          candidates.push({
            name: "Celestial Messenger Aura 🕊️",
            color: "#f9a8d4",
            confidence: conf,
          });
        }

        // Dream Seer (relaxed, eyes up / wide but mouth neutral)
        if ((eyeWide > 0.10 || eyeLookUp > 0.08) && smile < 0.3 && mouthPress < 0.3) {
          const conf = (eyeWide + eyeLookUp + (1 - smile)) / 3;
          candidates.push({
            name: "Dream Seer Aura ✨",
            color: "#38bdf8",
            confidence: conf,
          });
        }

        // Storm Dragon (brows down + tight mouth + jaw)
        if (browDown > 0.10 && (mouthPress > 0.12 || jawOpen > 0.12)) {
          const conf =
            (browDown + Math.max(mouthPress, jawOpen)) / 2;
          candidates.push({
            name: "Storm Dragon Aura 🐉",
            color: "#4fd1ff",
            confidence: conf,
          });
        }

        // Clockwork Alchemist (pursed lips / thinking)
        // Keep this as a more "extreme" tag so it appears less often
        if (mouthPucker > 0.45 || mouthPress > 0.48) {
          const conf = Math.max(mouthPucker, mouthPress);
          candidates.push({
            name: "Clockwork Alchemist Aura ⚙️",
            color: "#eab308",
            confidence: conf,
          });
        }

        // Twilight Familiar (eyes soft, small smile, slight brow down / downcast gaze)
        if (
          eyeSquint > 0.03 &&
          smile > 0.05 &&
          (browDown > 0.04 || eyeLookDown > 0.04)
        ) {
          const conf = (eyeSquint + smile + browDown) / 3;
          candidates.push({
            name: "Twilight Familiar Aura 🐈‍⬛",
            color: "#6366f1",
            confidence: conf,
          });
        }

        // Lilith's Tilt (noticeable head tilt left/right)
        if (Math.abs(headTilt) > 0.18) {
          const conf = Math.min(1, Math.abs(headTilt) * 2);
          candidates.push({
            name: "Lilith's Tilt Aura 🕯️",
            color: "#f97373",
            confidence: conf,
          });
        }

        // Crescent Seer (slight head tilt + soft smile)
        if (Math.abs(headTilt) > 0.1 && smile > 0.18 && eyeSquint > 0.12) {
          const conf = (Math.abs(headTilt) + smile + eyeSquint) / 3;
          candidates.push({
            name: "Crescent Seer Aura 🌘",
            color: "#facc15",
            confidence: conf,
          });
        }

        // Graveyard Whisper (head slightly down + eyes up)
        if (headNod > 0.03 && eyeLookUp > 0.16) {
          const conf = (headNod + eyeLookUp) / 2;
          candidates.push({
            name: "Graveyard Whisper Aura 🕯️",
            color: "#22c55e",
            confidence: conf,
          });
        }

        // Forest Spirit (mostly neutral / relaxed, *very* little movement)
        const activity =
          (smile +
            cheek +
            browUp +
            Math.abs(browDown) +
            eyeWide +
            jawOpen +
            mouthPress +
            eyeSquint) /
          8;
        // Only treat as Ancient Forest when face is *almost perfectly* still
        if (activity < 0.03) {
          const conf = 1 - activity;
          candidates.push({
            name: "Ancient Forest Spirit Aura 🌿",
            color: "#9ae6b4",
            confidence: conf,
          });
        }

        if (candidates.length === 0) {
          // Fallback – mysterious NPC, but keep confidence modest
          const maxScore = Math.max(
            smile,
            cheek,
            browUp,
            browDown,
            eyeWide,
            jawOpen,
            mouthPress,
            eyeSquint,
            mouthPucker
          );
          return {
            name: "Mysterious NPC Aura 👁",
            color: "orange",
            confidence: maxScore * 0.7,
          };
        }

        // If Witch or Fox are present as candidates, strongly prefer them
        const witchLike = candidates.find((c) =>
          c.name.includes("Witch")
        );
        const foxLike = candidates.find((c) =>
          c.name.includes("Fox")
        );
        if (witchLike || foxLike) {
          const pick = witchLike || foxLike;
          return {
            ...pick,
            confidence: (pick.confidence || 0) + 0.3,
          };
        }

        // Slight randomness among remaining candidates so tiny movements create variety.
        // Make the band wide so many different tags can win.
        const topConf = Math.max(...candidates.map((c) => c.confidence || 0));
        const close = candidates.filter(
          (c) => (c.confidence || 0) >= topConf - 0.25
        );
        const choice = close[Math.floor(Math.random() * close.length)];
        return choice;
      }

      // Aura smoothing state
      let smoothedAura = null;
      let currentAura = null;
      let auraHoldFrames = 0;
      const SMOOTH_ALPHA = 0.6; // more reactive so small changes show up
      const MIN_HOLD_FRAMES = 3; // switch allowed after very few frames
      const SWITCH_THRESHOLD = 0.03; // tiny edge is enough to switch

      // Manual capture / finalization state
      let finalizedAura = null;
      let auraCaptured = false;

      function captureScreenshotWithAura() {
        if (!window.html2canvas) {
          console.warn("html2canvas not loaded; cannot capture full-page screenshot.");
          return;
        }

        // Capture the whole visible page including background image and UI
        window.html2canvas(document.body, {
          useCORS: true,
          backgroundColor: null,
          scale: window.devicePixelRatio || 1,
        }).then((canvasShot) => {
          const dataUrl = canvasShot.toDataURL("image/png");

          let link = document.getElementById(downloadLinkId);
          if (!link) {
            link = document.createElement("a");
            link.id = downloadLinkId;
            link.style.display = "none";
            document.body.appendChild(link);
          }
          link.href = dataUrl;
          const ts = new Date().toISOString().replace(/[:.]/g, "-");
          link.download = `aurabox-${ts}.png`;
          link.click();
        });
      }

      function drawAuraFromLandmarks(landmarks, aura) {
        let minX = Infinity,
          minY = Infinity,
          maxX = -Infinity,
          maxY = -Infinity;

        for (const p of landmarks) {
          const x = p.x * canvas.width;
          const y = p.y * canvas.height;
          if (x < minX) minX = x;
          if (y < minY) minY = y;
          if (x > maxX) maxX = x;
          if (y > maxY) maxY = y;
        }

        const x = minX;
        const y = minY;
        const w = maxX - minX;
        const h = maxY - minY;

        // Draw colored bounding box
        ctx.strokeStyle = aura.color;
        ctx.lineWidth = 3;
        ctx.setLineDash([]);
        ctx.strokeRect(x, y, w, h);

        // Confidence label with slanted connector
        const confidencePercent = Math.round((aura.confidence || 0) * 100);
        const confText = `Confidence: ${confidencePercent}%`;
        ctx.font = "16px Arial";
        ctx.textBaseline = "middle";

        // Label rectangle position (to the top-right of the box)
        const labelWidth = ctx.measureText(confText).width + 20;
        const labelHeight = 26;
        const labelX = x + w + 30;
        const labelY = y - 10; // slight above top edge

        // Slanted line from top-right corner of box to left edge of label
        const startX = x + w;
        const startY = y;
        const endX = labelX;
        const endY = labelY + labelHeight / 2;

        ctx.beginPath();
        ctx.moveTo(startX, startY);
        ctx.lineTo(endX, endY);
        ctx.stroke();

        // Draw filled label rectangle
        ctx.fillStyle = "rgba(0, 0, 0, 0.7)";
        ctx.strokeStyle = aura.color;
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.roundRect(labelX, labelY, labelWidth, labelHeight, 6);
        ctx.fill();
        ctx.stroke();

        // Confidence text inside label
        ctx.fillStyle = aura.color;
        ctx.fillText(confText, labelX + 10, labelY + labelHeight / 2);

        // Draw aura label next to the box
        ctx.font = "20px Arial";
        ctx.fillStyle = aura.color;
        const labelText = aura.name;
        const textX = Math.max(0, x);
        const textY = Math.max(20, y - 10);
        ctx.fillText(labelText, textX, textY);
      }

      async function init() {
        await setupCamera();

        const resolver = await FilesetResolver.forVisionTasks(
          "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.0/wasm"
        );

        const faceLandmarker = await FaceLandmarker.createFromOptions(
          resolver,
          {
            baseOptions: {
              modelAssetPath:
                "https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/1/face_landmarker.task",
            },
            outputFaceBlendshapes: true,
            runningMode: "VIDEO",
            numFaces: 1,
          }
        );

        // When the user clicks "Capture aura", freeze the current aura and save a screenshot
        captureButton.addEventListener("click", () => {
          if (currentAura) {
            finalizedAura = { ...currentAura };
            auraCaptured = true;
            captureScreenshotWithAura();
          }
        });

        // Reset button: clear captured aura and resume live scanning
        resetButton.addEventListener("click", () => {
          finalizedAura = null;
          auraCaptured = false;
          label.innerText = "Scanning aura...";
        });

        async function detect() {
          ctx.clearRect(0, 0, canvas.width, canvas.height);

          const result = faceLandmarker.detectForVideo(
            video,
            performance.now()
          );

          if (result.faceLandmarks && result.faceLandmarks.length > 0) {
            const landmarks = result.faceLandmarks[0];
            const blend = result.faceBlendshapes?.[0]?.categories || [];
            const aura = classifyAura(blend, landmarks);

            // --- smoothing + stability logic ---
            if (!smoothedAura || smoothedAura.name !== aura.name) {
              smoothedAura = { ...aura };
            } else {
              smoothedAura.confidence =
                SMOOTH_ALPHA * aura.confidence +
                (1 - SMOOTH_ALPHA) * smoothedAura.confidence;
            }

            if (!currentAura) {
              currentAura = { ...smoothedAura };
              auraHoldFrames = 0;
            } else {
              auraHoldFrames++;
              const sameName = smoothedAura.name === currentAura.name;

              if (sameName) {
                currentAura.confidence = smoothedAura.confidence;
                auraHoldFrames = 0;
              } else {
                const strongerBy =
                  (smoothedAura.confidence || 0) -
                  (currentAura.confidence || 0);

                if (
                  auraHoldFrames > MIN_HOLD_FRAMES &&
                  strongerBy > SWITCH_THRESHOLD
                ) {
                  currentAura = { ...smoothedAura };
                  auraHoldFrames = 0;
                }
              }
            }

            const displayAura = finalizedAura || currentAura || aura;
            drawAuraFromLandmarks(landmarks, displayAura);
            const conf = Math.round((displayAura.confidence || 0) * 100);
            label.innerText = finalizedAura
              ? `Captured aura: ${displayAura.name} (${conf}%)`
              : `Scanning aura: ${displayAura.name} (${conf}%)`;
          } else {
            // No face: reset state so new session can pick a fresh aura
            smoothedAura = null;
            currentAura = null;
            finalizedAura = null;
            auraCaptured = false;
            label.innerText = "Looking for your aura...";
          }

          requestAnimationFrame(detect);
        }

        detect();
      }

      init();
    </script>
  </body>
</html>
