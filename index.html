<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>AuraBox MVP</title>
    <!-- Anime-style font -->
    <link
      href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <!-- html2canvas for full-page screenshot capture -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <style>
      :root {
        --aura-accent: #ff7bff;
        --aura-accent-2: #7ff0ff;
        --panel-bg: rgba(5, 5, 20, 0.82);
      }

      body {
        margin: 0;
        background-image: url("we_can_do_it.jpg");
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
        background-color: #0f0f14; /* fallback color while image loads */
        color: #fdf4ff;
        font-family: "M PLUS Rounded 1c", system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
        text-align: center;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: flex-start;
        padding-top: 32px;
      }
      #container {
        position: relative;
        width: 640px;
        height: 480px; /* ensure video area is fully visible */
        margin: 24px auto 0;
        padding: 12px;
        border-radius: 18px;
        background: linear-gradient(135deg, rgba(15, 15, 40, 0.96), rgba(12, 4, 24, 0.96));
        box-shadow:
          0 0 25px rgba(255, 123, 255, 0.45),
          0 0 60px rgba(56, 189, 248, 0.25);
        border: 2px solid rgba(255, 255, 255, 0.08);
        overflow: visible;
      }
      video,
      canvas {
        position: absolute;
        top: 0;
        left: 0;
      }

      video {
        transform-origin: center center;
      }
      #auraLabel {
        margin-top: 20px;
        font-size: 26px;
        letter-spacing: 0.04em;
        text-shadow:
          0 0 6px rgba(0, 0, 0, 0.7),
          0 0 16px rgba(255, 123, 255, 0.8);
        padding: 10px 20px;
        display: inline-block;
        border-radius: 999px;
        background: radial-gradient(circle at top left, rgba(255, 123, 255, 0.45), transparent),
          radial-gradient(circle at bottom right, rgba(56, 189, 248, 0.5), transparent),
          rgba(5, 5, 20, 0.75);
        border: 1px solid rgba(255, 255, 255, 0.18);
        backdrop-filter: blur(10px);
      }

      #controls {
        margin-top: 12px;
        display: flex;
        gap: 12px;
        justify-content: center;
        align-items: center;
      }

      #captureButton {
        padding: 8px 18px;
        border-radius: 999px;
        border: 1px solid rgba(255, 255, 255, 0.5);
        background: radial-gradient(circle at top left, rgba(255, 255, 255, 0.18), transparent),
          rgba(5, 5, 20, 0.9);
        color: #fef9ff;
        font-family: inherit;
        font-size: 16px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        cursor: pointer;
        box-shadow:
          0 0 10px rgba(255, 255, 255, 0.45),
          0 0 20px rgba(56, 189, 248, 0.4);
        transition: transform 0.08s ease, box-shadow 0.1s ease, background 0.1s ease;
      }

      #captureButton:hover {
        transform: translateY(-1px);
        box-shadow:
          0 0 14px rgba(255, 255, 255, 0.6),
          0 0 26px rgba(244, 114, 182, 0.7);
      }

      #captureButton:active {
        transform: translateY(1px) scale(0.98);
        box-shadow:
          0 0 6px rgba(255, 255, 255, 0.4),
          0 0 16px rgba(56, 189, 248, 0.4);
      }

      #filterSelect {
        padding: 8px 14px;
        border-radius: 999px;
        border: 1px solid rgba(255, 255, 255, 0.4);
        background: rgba(5, 5, 20, 0.9);
        color: #fef9ff;
        font-family: inherit;
        font-size: 14px;
        letter-spacing: 0.04em;
        cursor: pointer;
        outline: none;
        box-shadow: 0 0 10px rgba(255, 255, 255, 0.2);
      }

      #filterSelect:hover {
        border-color: rgba(255, 123, 255, 0.6);
        box-shadow: 0 0 12px rgba(255, 123, 255, 0.3);
      }

      #filterSelect option {
        background: #1a1a2e;
        color: #fef9ff;
      }

      .filter-label {
        font-size: 14px;
        letter-spacing: 0.06em;
        opacity: 0.9;
        margin-right: 4px;
      }

      h1 {
        margin: 0;
        padding: 6px 18px 12px;
        font-size: 34px;
        letter-spacing: 0.16em;
        text-transform: uppercase;
        color: #fef9ff;
        text-shadow:
          0 0 10px rgba(255, 255, 255, 0.7),
          0 0 25px rgba(255, 123, 255, 0.9),
          0 0 40px rgba(56, 189, 248, 0.7);
        position: relative;
        display: inline-block;
      }

      h1::before,
      h1::after {
        content: "";
        position: absolute;
        height: 2px;
        width: 38px;
        top: 50%;
        background: linear-gradient(
          to right,
          transparent,
          var(--aura-accent),
          transparent
        );
      }

      h1::before {
        right: 100%;
        margin-right: 8px;
      }

      h1::after {
        left: 100%;
        margin-left: 8px;
      }
    </style>
  </head>
  <body>
    <h1>AuraBox Scanner</h1>

    <div id="container">
      <video id="video" width="640" height="480" autoplay muted></video>
      <canvas id="overlay" width="640" height="480"></canvas>
    </div>

    <div id="auraLabel">Initializing aura scan...</div>
    <div id="controls">
      <span class="filter-label">Filter</span>
      <select id="filterSelect">
        <option value="none">None</option>
        <option value="soft">Soft glow</option>
        <option value="warm">Warm</option>
        <option value="cool">Cool</option>
        <option value="vintage">Vintage</option>
        <option value="nostalgic">CCD effect</option>
        <option value="dreamy">Dreamy</option>
      </select>

      <span class="filter-label">Face</span>
      <select id="slimSelect">
        <option value="normal">Normal</option>
        <option value="slim">Slim face</option>
      </select>

      <span class="filter-label">View</span>
      <select id="viewSelect">
        <option value="normal">Normal</option>
        <option value="mirror">Mirror</option>
      </select>

      <span class="filter-label">Frames</span>
      <select id="frameSelect">
        <option value="none">None</option>
        <option value="cookieland">Cookieland tempura cloud</option>
      </select>

      <button id="captureButton">Capture aura</button>
      <button id="resetButton">Reset</button>
    </div>

    <script type="module">
      import {
        FaceLandmarker,
        FilesetResolver,
      } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.0";

      const video = document.getElementById("video");
      const canvas = document.getElementById("overlay");
      const container = document.getElementById("container");
      const ctx = canvas.getContext("2d");
      const label = document.getElementById("auraLabel");
      const captureButton = document.getElementById("captureButton");
      const resetButton = document.getElementById("resetButton");
      const filterSelect = document.getElementById("filterSelect");
      const slimSelect = document.getElementById("slimSelect");
      const viewSelect = document.getElementById("viewSelect");
      const frameSelect = document.getElementById("frameSelect");
      const downloadLinkId = "aura-download-link";

      // Base beautify filter (always on: subtle "whitening" + smoothing)
      // Higher brightness + slightly reduced saturation gives a gentle skin‑brightening effect.
      const BASE_VIDEO_FILTER =
        "brightness(1.06) contrast(1.03) saturate(0.96) blur(0.5px)";

      // Frame overlay sources (relative URLs so they work from the server)
      const FRAME_SOURCES = {
        cookieland: "cookieland_tempura_cloud.png",
      };
      const frameImages = {};

      for (const [key, src] of Object.entries(FRAME_SOURCES)) {
        const img = new Image();
        img.src = src;
        img.crossOrigin = "anonymous";
        frameImages[key] = img;
      }

      // User-adjustable frame offset (so they can move stickers around)
      let frameOffsetX = 0;
      let frameOffsetY = 0;

      // Current face slimming state (affects video transform only)
      let faceSlimScaleX = 1;
      // Current mirror view state
      let isMirrorView = false;

      // Web-friendly video filters (CSS filter applied on top of base filter)
      const VIDEO_FILTERS = {
        none: "",
        soft: "brightness(1.08) contrast(1.02) saturate(1.12)",
        warm: "sepia(0.15) brightness(1.05) saturate(1.15)",
        cool: "hue-rotate(-8deg) brightness(1.04) saturate(1.08)",
        vintage: "sepia(0.3) contrast(1.08) brightness(0.98)",
        // Nostalgic: subtle cool tone + tiny pink, with stronger soft blur
        nostalgic:
          "brightness(1.03) contrast(1.01) saturate(1.02) hue-rotate(-8deg) blur(0.9px)",
        // Dreamy: same tone as cool, with separate snow/sparkle overlay
        dreamy: "hue-rotate(-8deg) brightness(1.04) saturate(1.08) blur(0.2px)",
      };

      function applyVideoFilter() {
        const key = filterSelect.value || "none";
        const extra = VIDEO_FILTERS[key] || VIDEO_FILTERS.none;
        video.style.filter = `${BASE_VIDEO_FILTER} ${extra}`.trim();
      }

      function updateVideoTransform() {
        const mirrorFactor = isMirrorView ? -1 : 1;
        const scaleX = faceSlimScaleX * mirrorFactor;
        video.style.transform = `scaleX(${scaleX})`;
      }

      function applyFaceSlimming() {
        const mode = slimSelect.value || "normal";
        faceSlimScaleX = mode === "slim" ? 0.93 : 1;
        updateVideoTransform();
      }

      function applyViewMode() {
        const mode = viewSelect.value || "normal";
        isMirrorView = mode === "mirror";
        updateVideoTransform();
      }

      filterSelect.addEventListener("change", applyVideoFilter);
      slimSelect.addEventListener("change", applyFaceSlimming);
      viewSelect.addEventListener("change", applyViewMode);
      applyVideoFilter(); // apply initial selection
      applyFaceSlimming(); // apply initial slimming state
      applyViewMode(); // apply initial view mode

      async function setupCamera() {
        const stream = await navigator.mediaDevices.getUserMedia({
          video: true,
        });
        video.srcObject = stream;

        // Wait until video has dimensions
        return new Promise((resolve) => {
          video.onloadedmetadata = () => {
            video.play();
            resolve();
          };
        });
      }

      function classifyAura(blendshapes, landmarks) {
        if (!blendshapes) {
          return {
            name: "Mysterious NPC Aura 👁",
            color: "orange",
            confidence: 0,
          };
        }

        const get = (name) =>
          blendshapes.find((b) => b.categoryName === name)?.score || 0;

        const smile =
          (get("mouthSmileLeft") + get("mouthSmileRight")) / 2;
        const cheek =
          (get("cheekSquintLeft") + get("cheekSquintRight")) / 2;
        const browUp = get("browInnerUp");
        const browDown =
          (get("browDownLeft") + get("browDownRight")) / 2;
        const eyeWide =
          (get("eyeWideLeft") + get("eyeWideRight")) / 2;
        const jawOpen = get("jawOpen");
        const mouthPress =
          (get("mouthPressLeft") + get("mouthPressRight")) / 2;
        const eyeSquint =
          (get("eyeSquintLeft") + get("eyeSquintRight")) / 2;
        const eyeBlinkLeft = get("eyeBlinkLeft");
        const eyeBlinkRight = get("eyeBlinkRight");
        const mouthPucker = get("mouthPucker");
        const eyeLookDown =
          (get("eyeLookDownLeft") + get("eyeLookDownRight")) / 2;

        // Head tilt for tilted‑head aura
        let headTilt = 0;
        if (landmarks && landmarks.length > 0) {
          const leftEyeOuter = landmarks[33];
          const rightEyeOuter = landmarks[263];
          if (leftEyeOuter && rightEyeOuter) {
            const dx = rightEyeOuter.x - leftEyeOuter.x;
            const dy = rightEyeOuter.y - leftEyeOuter.y;
            headTilt = Math.atan2(dy, dx);
          }
        }

        // Overall activity = how "alive" the face is
        const activity =
          (Math.abs(smile) +
            Math.abs(cheek) +
            Math.abs(browUp) +
            Math.abs(browDown) +
            Math.abs(eyeWide) +
            Math.abs(jawOpen) +
            Math.abs(mouthPress) +
            Math.abs(eyeSquint)) /
          8;

        // Wink info (for Witch vs Fox)
        const blinkDiffLR = eyeBlinkLeft - eyeBlinkRight;
        const blinkDiffRL = eyeBlinkRight - eyeBlinkLeft;
        const winkOneSide = Math.abs(blinkDiffLR) > 0.1 || Math.abs(blinkDiffRL) > 0.1;
        const bothEyesClosed = eyeBlinkLeft > 0.4 && eyeBlinkRight > 0.4;
        const anyWink = winkOneSide || bothEyesClosed;

        // 1) Mysterious NPC – still face with no expression
        if (activity < 0.01 && smile < 0.02) {
          return {
            name: "Mysterious NPC Aura 👁",
            color: "orange",
            confidence: 1 - activity,
          };
        }

        // 2) Ancient Forest – subtle soft smile (no wink)
        if (
          !anyWink &&
          smile >= 0.02 &&
          smile < 0.08
        ) {
          const conf = (smile + (1 - Math.abs(browDown)) + (1 - activity)) / 3;
          return {
            name: "Ancient Forest Spirit Aura 🌿",
            color: "#9ae6b4",
            confidence: Math.min(1, conf),
          };
        }

        // 3) Ancient Alchemist – dull face: low expression, mouth not smiling
        if (
          activity >= 0.06 &&
          activity < 0.2 &&
          smile < 0.08 &&
          !anyWink
        ) {
          const dullMouth = Math.max(mouthPucker, mouthPress, eyeLookDown);
          const conf = (activity + dullMouth + Math.abs(browDown)) / 3;
          return {
            name: "Ancient Alchemist Aura ⚙️",
            color: "#eab308",
            confidence: Math.min(1, conf),
          };
        }

        // 4) Witch – *very* slight smile with wink (one or both eyes)
        if (anyWink && smile >= 0.02) {
          const conf =
            (smile + eyeSquint + Math.abs(blinkDiffLR) + Math.abs(blinkDiffRL)) /
              4 +
            0.3;
          return {
            name: "Moonlit Witch Aura 🌙",
            color: "#a855f7",
            confidence: Math.min(1, conf),
          };
        }

        // 5) Tilted head – Lilith tilt aura (head slightly tilted)
        if (Math.abs(headTilt) > 0.12) {
          const conf = Math.min(1, Math.abs(headTilt) * 2 + activity);
          return {
            name: "Lilith's Tilt Aura 🕯️",
            color: "#f97373",
            confidence: conf,
          };
        }

        // 6) Magical Girl – happy face: any clear smile (especially if mouth open)
        if (smile >= 0.15) {
          const conf = (smile + jawOpen + cheek) / 3 + 0.2;
          return {
            name: "Magical Girl Aura ✨",
            color: "#f472b6",
            confidence: Math.min(1, conf),
          };
        }

        // 7) Fox – almost the same as Witch: slight smile + "squinty" mischievous eyes, but NO wink
        // Witch: anyWink || smile >= 0.08
        // Fox: no wink, slightly smaller smile, more emphasis on eyeSquint / browDown
        if (!anyWink && smile >= 0.03) {
          const conf =
            (smile * 0.6 + eyeSquint * 1.2 + Math.abs(browDown) * 0.8) / 2.6 +
            0.25;
          return {
            name: "Shadow Fox Aura 🦊",
            color: "#f97316",
            confidence: Math.min(1, conf),
          };
        }

        // 8) Fallback – NPC‑like if nothing else matches
        return {
          name: "Mysterious NPC Aura 👁",
          color: "orange",
          confidence: Math.min(1, activity + 0.2),
        };
      }

      // Aura smoothing state (keep short-term smoothing so fluctuations look nice)
      let smoothedAura = null;
      let currentAura = null;
      let auraHoldFrames = 0;
      const SMOOTH_ALPHA = 0.6;
      const MIN_HOLD_FRAMES = 2;
      const SWITCH_THRESHOLD = 0.02;

      // Auto finalization over first 5s
      let finalizedAura = null;
      let auraHistory = []; // { name, color, confidence, t }
      let historyStartTime = null;

      // Precomputed dreamy sparkles (so they appear static, starry)
      let dreamySparkles = null; // [{ x, y, radius }, ...]

      function captureScreenshotWithAura(displayAura) {
        if (!window.html2canvas) {
          console.warn("html2canvas not loaded; cannot capture full-page screenshot.");
          return;
        }

        // Temporarily set label text to final aura before capture
        const prevText = label.innerText;
        if (displayAura) {
          const conf = Math.round((displayAura.confidence || 0) * 100);
          label.innerText = `Final aura: ${displayAura.name} (${conf}%)`;
        }

        window.html2canvas(document.body, {
          useCORS: true,
          backgroundColor: null,
          scale: window.devicePixelRatio || 1,
        }).then((canvasShot) => {
          const dataUrl = canvasShot.toDataURL("image/png");

          let link = document.getElementById(downloadLinkId);
          if (!link) {
            link = document.createElement("a");
            link.id = downloadLinkId;
            link.style.display = "none";
            document.body.appendChild(link);
          }
          link.href = dataUrl;
          const ts = new Date().toISOString().replace(/[:.]/g, "-");
          link.download = `aurabox-${ts}.png`;
          link.click();

          // Restore previous label text
          label.innerText = prevText;
        });
      }

      function drawAuraFromLandmarks(landmarks, aura) {
        ctx.save();
        if (isMirrorView) {
          // Mirror all aura drawings horizontally so they line up with mirrored video.
          ctx.translate(canvas.width, 0);
          ctx.scale(-1, 1);
        }
        let minX = Infinity,
          minY = Infinity,
          maxX = -Infinity,
          maxY = -Infinity;

        for (const p of landmarks) {
          const x = p.x * canvas.width;
          const y = p.y * canvas.height;
          if (x < minX) minX = x;
          if (y < minY) minY = y;
          if (x > maxX) maxX = x;
          if (y > maxY) maxY = y;
        }

        const x = minX;
        const y = minY;
        const w = maxX - minX;
        const h = maxY - minY;

        // Draw colored bounding box
        ctx.strokeStyle = aura.color;
        ctx.lineWidth = 3;
        ctx.setLineDash([]);
        ctx.strokeRect(x, y, w, h);

        // Confidence label with slanted connector
        const confidencePercent = Math.round((aura.confidence || 0) * 100);
        const confText = `Confidence: ${confidencePercent}%`;
        ctx.font = "16px Arial";
        ctx.textBaseline = "middle";

        // Label rectangle position (to the top-right of the box)
        const labelWidth = ctx.measureText(confText).width + 20;
        const labelHeight = 26;
        const labelX = x + w + 30;
        const labelY = y - 10; // slight above top edge

        // Slanted line from top-right corner of box to left edge of label
        const startX = x + w;
        const startY = y;
        const endX = labelX;
        const endY = labelY + labelHeight / 2;

        ctx.beginPath();
        ctx.moveTo(startX, startY);
        ctx.lineTo(endX, endY);
        ctx.stroke();

        // Draw filled label rectangle
        ctx.fillStyle = "rgba(0, 0, 0, 0.7)";
        ctx.strokeStyle = aura.color;
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.roundRect(labelX, labelY, labelWidth, labelHeight, 6);
        ctx.fill();
        ctx.stroke();

        // Confidence text inside label
        ctx.fillStyle = aura.color;
        ctx.fillText(confText, labelX + 10, labelY + labelHeight / 2);

        // Draw aura label next to the box
        ctx.font = "20px Arial";
        ctx.fillStyle = aura.color;
        const labelText = aura.name;
        const textX = Math.max(0, x);
        const textY = Math.max(20, y - 10);
        ctx.fillText(labelText, textX, textY);

        // Nostalgic vignette / bloom overlay (mostly cool, almost no tint)
        if (filterSelect.value === "nostalgic") {
          const grad = ctx.createRadialGradient(
            canvas.width / 2,
            canvas.height / 2,
            0,
            canvas.width / 2,
            canvas.height / 2,
            Math.max(canvas.width, canvas.height) * 0.75
          );
          // Very light cool vignette with a hint of pink in the center
          grad.addColorStop(0, "rgba(245, 215, 235, 0.02)"); // almost neutral with a touch of pink
          grad.addColorStop(0.45, "rgba(190, 210, 255, 0.025)"); // soft cool tone
          grad.addColorStop(1, "rgba(20, 30, 60, 0.06)"); // gentle cool dark edge

          ctx.fillStyle = grad;
          ctx.globalCompositeOperation = "soft-light";
          ctx.fillRect(0, 0, canvas.width, canvas.height);
          ctx.globalCompositeOperation = "source-over";
        }

        // Dreamy sparkle overlay (very soft, whole-screen, static positions)
        if (filterSelect.value === "dreamy") {
          if (!dreamySparkles) {
            const sparkleCount = 22;
            const maxRadius = Math.min(canvas.width, canvas.height) * 0.035;
            dreamySparkles = Array.from({ length: sparkleCount }, () => ({
              x: Math.random() * canvas.width,
              y: Math.random() * canvas.height,
              radius: 1.2 + Math.random() * maxRadius,
            }));
          }

          for (const { x: sx, y: sy, radius } of dreamySparkles) {

            const gradient = ctx.createRadialGradient(
              sx,
              sy,
              0,
              sx,
              sy,
              radius
            );
            gradient.addColorStop(0, "rgba(255, 255, 255, 0.28)");
            gradient.addColorStop(0.3, "rgba(220, 235, 255, 0.16)");
            gradient.addColorStop(1, "rgba(190, 210, 255, 0)");

            ctx.fillStyle = gradient;
            ctx.globalAlpha = 0.9;
            ctx.beginPath();
            ctx.arc(sx, sy, radius, 0, Math.PI * 2);
            ctx.fill();
            ctx.globalAlpha = 1;
          }
        }
        ctx.restore();
      }

      function drawFrameOverlay() {
        const frameKey = frameSelect.value || "none";
        if (frameKey === "none") return;
        const img = frameImages[frameKey];
        if (!img || !img.complete) return;

        // Draw the frame at its original aspect ratio,
        // scaled to COVER the canvas (no stretching, may crop),
        // and aligned so the sticker content sits near the bottom.
        const imgW = img.naturalWidth || img.width;
        const imgH = img.naturalHeight || img.height;
        if (!imgW || !imgH) return;

        // Use "cover" style scaling so it fills the frame without distortion.
        const scale = Math.max(canvas.width / imgW, canvas.height / imgH);
        const drawW = imgW * scale;
        const drawH = imgH * scale;

        // Center horizontally and allow a user-controlled offset
        // so they can move the sticker artwork around.
        const dx = (canvas.width - drawW) / 2;
        const dy = (canvas.height - drawH) / 2;

        ctx.drawImage(
          img,
          dx + frameOffsetX,
          dy + frameOffsetY,
          drawW,
          drawH
        );
      }

      async function init() {
        await setupCamera();

        const resolver = await FilesetResolver.forVisionTasks(
          "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.0/wasm"
        );

        const faceLandmarker = await FaceLandmarker.createFromOptions(
          resolver,
          {
            baseOptions: {
              modelAssetPath:
                "https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/1/face_landmarker.task",
            },
            outputFaceBlendshapes: true,
            runningMode: "VIDEO",
            numFaces: 1,
          }
        );

        // Allow users to drag the frame/stickers around on the video area
        let isDraggingFrame = false;
        let dragStartX = 0;
        let dragStartY = 0;
        let initialOffsetX = 0;
        let initialOffsetY = 0;

        canvas.addEventListener("mousedown", (e) => {
          if (!frameSelect || frameSelect.value === "none") return;
          isDraggingFrame = true;
          dragStartX = e.offsetX;
          dragStartY = e.offsetY;
          initialOffsetX = frameOffsetX;
          initialOffsetY = frameOffsetY;
        });

        window.addEventListener("mousemove", (e) => {
          if (!isDraggingFrame) return;
          const rect = canvas.getBoundingClientRect();
          const x = e.clientX - rect.left;
          const y = e.clientY - rect.top;
          frameOffsetX = initialOffsetX + (x - dragStartX);
          frameOffsetY = initialOffsetY + (y - dragStartY);
        });

        window.addEventListener("mouseup", () => {
          isDraggingFrame = false;
        });

        // When the user clicks "Capture aura", save a screenshot of the final aura
        captureButton.addEventListener("click", () => {
          const auraForShot = finalizedAura || currentAura;
          if (auraForShot) {
            captureScreenshotWithAura(auraForShot);
          }
        });

        // Reset button: clear all aura state and history, resume live scanning
        resetButton.addEventListener("click", () => {
          finalizedAura = null;
          smoothedAura = null;
          currentAura = null;
          auraHistory = [];
          historyStartTime = null;
          label.innerText = "Scanning aura: ... (0%)";
        });

        async function detect() {
          ctx.clearRect(0, 0, canvas.width, canvas.height);

          const result = faceLandmarker.detectForVideo(
            video,
            performance.now()
          );

          if (result.faceLandmarks && result.faceLandmarks.length > 0) {
            const landmarks = result.faceLandmarks[0];
            const blend = result.faceBlendshapes?.[0]?.categories || [];
            const aura = classifyAura(blend, landmarks);

            // --- smoothing + stability logic ---
            if (!smoothedAura || smoothedAura.name !== aura.name) {
              smoothedAura = { ...aura };
            } else {
              smoothedAura.confidence =
                SMOOTH_ALPHA * aura.confidence +
                (1 - SMOOTH_ALPHA) * smoothedAura.confidence;
            }

            if (!currentAura) {
              currentAura = { ...smoothedAura };
              auraHoldFrames = 0;
            } else {
              auraHoldFrames++;
              const sameName = smoothedAura.name === currentAura.name;

              if (sameName) {
                currentAura.confidence = smoothedAura.confidence;
                auraHoldFrames = 0;
              } else {
                const strongerBy =
                  (smoothedAura.confidence || 0) -
                  (currentAura.confidence || 0);

                if (
                  auraHoldFrames > MIN_HOLD_FRAMES &&
                  strongerBy > SWITCH_THRESHOLD
                ) {
                  currentAura = { ...smoothedAura };
                  auraHoldFrames = 0;
                }
              }
            }

            // Build history over first 5 seconds to pick a final aura
            const now = performance.now();
            if (!historyStartTime) {
              historyStartTime = now;
            }
            if (!finalizedAura) {
              auraHistory.push({
                name: currentAura.name,
                color: currentAura.color,
                confidence: currentAura.confidence,
                t: now,
              });
              // Keep only last 5s of history
              const windowMs = 5000;
              auraHistory = auraHistory.filter((item) => now - item.t <= windowMs);

              // After 5s from start, choose the most frequent aura name
              if (now - historyStartTime >= windowMs && auraHistory.length > 0) {
                const counts = {};
                const bestSampleByName = {};
                for (const item of auraHistory) {
                  counts[item.name] = (counts[item.name] || 0) + 1;
                  if (
                    !bestSampleByName[item.name] ||
                    (item.confidence || 0) >
                      (bestSampleByName[item.name].confidence || 0)
                  ) {
                    bestSampleByName[item.name] = item;
                  }
                }
                let bestName = null;
                let bestCount = -1;
                for (const name in counts) {
                  if (counts[name] > bestCount) {
                    bestCount = counts[name];
                    bestName = name;
                  }
                }
                if (bestName) {
                  const pick = bestSampleByName[bestName];
                  finalizedAura = {
                    name: pick.name,
                    color: pick.color,
                    confidence: pick.confidence,
                  };
                }
              }
            }

            const displayAura = finalizedAura || currentAura || aura;
            drawAuraFromLandmarks(landmarks, displayAura);
            const conf = Math.round((displayAura.confidence || 0) * 100);
            label.innerText = finalizedAura
              ? `Final aura: ${displayAura.name} (${conf}%)`
              : `Scanning aura: ${displayAura.name} (${conf}%)`;
          } else {
            // No face: reset state so new session can pick a fresh aura
            smoothedAura = null;
            currentAura = null;
            finalizedAura = null;
            auraHistory = [];
            historyStartTime = null;
            label.innerText = "Looking for your aura...";
          }

          // Draw any selected frame overlay last so it sits on top
          drawFrameOverlay();

          requestAnimationFrame(detect);
        }

        detect();
      }

      init();
    </script>
  </body>
</html>
